name: Release package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.13.1"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-package-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build-notifier:
    name: Build notarized macOS notifier
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ inputs.tag || github.ref_name }}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must look like v1.2.3 or v1.2.3-beta.1; got '$tag'." >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Check out release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Import signing certificate
        env:
          MACOS_CODESIGN_CERTIFICATE_BASE64: ${{ secrets.MACOS_CODESIGN_CERTIFICATE_BASE64 }}
          MACOS_CODESIGN_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CODESIGN_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_CODESIGN_KEYCHAIN_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "$MACOS_CODESIGN_CERTIFICATE_BASE64"
          test -n "$MACOS_CODESIGN_CERTIFICATE_PASSWORD"
          keychain_password="${KEYCHAIN_PASSWORD:-$(uuidgen)}"
          certificate_path="$RUNNER_TEMP/developer-id.p12"
          keychain_path="$RUNNER_TEMP/oracle-signing.keychain-db"
          printf '%s' "$MACOS_CODESIGN_CERTIFICATE_BASE64" | base64 --decode > "$certificate_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" -P "$MACOS_CODESIGN_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security list-keychains -d user -s "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"

      - name: Build notifier app
        env:
          CODESIGN_ID: ${{ secrets.CODESIGN_ID }}
          APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "$CODESIGN_ID"
          test -n "$APP_STORE_CONNECT_API_KEY_P8"
          test -n "$APP_STORE_CONNECT_KEY_ID"
          test -n "$APP_STORE_CONNECT_ISSUER_ID"
          vendor/oracle-notifier/build-notifier.sh

      - name: Archive notifier app
        shell: bash
        run: tar -C vendor/oracle-notifier -czf "$RUNNER_TEMP/oracle-notifier-app.tar.gz" OracleNotifier.app

      - name: Upload notifier app
        uses: actions/upload-artifact@v6
        with:
          name: oracle-notifier-app
          path: ${{ runner.temp }}/oracle-notifier-app.tar.gz
          if-no-files-found: error

  package:
    name: Build package artifact
    needs: build-notifier
    runs-on: hetzner-hel1-ex63
    timeout-minutes: 15
    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ inputs.tag || github.ref_name }}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must look like v1.2.3 or v1.2.3-beta.1; got '$tag'." >&2
            exit 1
          fi
          version="${tag#v}"
          prerelease="false"
          if [[ "$version" == *-* ]]; then
            prerelease="true"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

      - name: Check out release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: false

      - name: Verify package version matches tag
        shell: bash
        run: |
          set -euo pipefail
          package_version="$(node -p "require('./package.json').version")"
          if [[ "$package_version" != "${{ steps.release.outputs.version }}" ]]; then
            echo "package.json version '$package_version' does not match tag '${{ steps.release.outputs.tag }}'." >&2
            exit 1
          fi

      - name: Install dependencies
        run: mise run install

      - name: Download notifier app
        uses: actions/download-artifact@v6
        with:
          name: oracle-notifier-app
          path: ${{ runner.temp }}

      - name: Restore notifier app
        shell: bash
        run: tar -C vendor/oracle-notifier -xzf "$RUNNER_TEMP/oracle-notifier-app.tar.gz"

      - name: Run release gates
        run: |
          mise run check
          mise run test
          mise run build
          mise run test-packed-cli

      - name: Pack npm tarball
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          outdir="$RUNNER_TEMP/oracle-package"
          mkdir -p "$outdir"
          mise exec -- pnpm pack --pack-destination "$outdir"
          packed="$(find "$outdir" -maxdepth 1 -name '*.tgz' -print -quit)"
          if [[ -z "$packed" ]]; then
            echo "pnpm pack did not produce a tarball." >&2
            exit 1
          fi
          artifact="oracle-${{ steps.release.outputs.version }}.tgz"
          mv "$packed" "$outdir/$artifact"
          (
            cd "$outdir"
            shasum "$artifact" > "$artifact.sha1"
            shasum -a 256 "$artifact" > "$artifact.sha256"
          )
          echo "dir=$outdir" >> "$GITHUB_OUTPUT"
          echo "artifact=$artifact" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: oracle-${{ steps.release.outputs.version }}
          path: |
            ${{ steps.pack.outputs.dir }}/${{ steps.pack.outputs.artifact }}
            ${{ steps.pack.outputs.dir }}/${{ steps.pack.outputs.artifact }}.sha1
            ${{ steps.pack.outputs.dir }}/${{ steps.pack.outputs.artifact }}.sha256
          if-no-files-found: error

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.release.outputs.tag }}"
          version="${{ steps.release.outputs.version }}"
          notes_file="$RUNNER_TEMP/release-notes.md"
          awk -v version="$version" '
            $0 == "## " version || $0 ~ "^## " version " [—-]" { capture=1; next }
            capture && /^## / { exit }
            capture { print }
          ' CHANGELOG.md | sed '/./,$!d' > "$notes_file"
          if [[ ! -s "$notes_file" ]]; then
            printf 'Release %s.\n' "$version" > "$notes_file"
          fi
          release_flags=()
          if [[ "${{ steps.release.outputs.prerelease }}" == "true" ]]; then
            release_flags+=(--prerelease)
          fi
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "$version" --notes-file "$notes_file" "${release_flags[@]}"
          else
            gh release create "$tag" --title "$version" --notes-file "$notes_file" "${release_flags[@]}"
          fi
          gh release upload "$tag" \
            "${{ steps.pack.outputs.dir }}/${{ steps.pack.outputs.artifact }}" \
            "${{ steps.pack.outputs.dir }}/${{ steps.pack.outputs.artifact }}.sha1" \
            "${{ steps.pack.outputs.dir }}/${{ steps.pack.outputs.artifact }}.sha256" \
            --clobber
