name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v3
      - run: mise run install
      - run: mise run lint
      - run: mise run docs-check
        if: matrix.os == 'ubuntu-latest'
      - run: mise run docs-site
        if: matrix.os == 'ubuntu-latest'
      - run: mise run test
      - run: mise run build
        if: matrix.os == 'ubuntu-latest'
      - run: mise run test-packed-cli
        if: matrix.os == 'ubuntu-latest'
